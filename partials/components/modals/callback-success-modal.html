<dialog class="modal modal--callback-success js-modal" id="callback-success-modal">
    <div class="modal__container">
        <button type="button" class="modal__close" aria-label="Закрыть модальное окно" data-close>
            <svg width="14" height="14" aria-hidden="true">
                <use xlink:href="#close"></use>
            </svg>
        </button>
        <div class="modal__content callback-success-modal">
            <p class="callback-success-modal__title">
                Мы приняли вашу заявку<br>и в ближайшее время свяжемся с вами
            </p>
            <button type="button" class="outline-btn callback-success-modal__action" data-close>
                Хорошо
            </button>
        </div>
    </div>
</dialog>
