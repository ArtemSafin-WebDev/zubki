<label class="text-input{{#if class}} {{ class }}{{/if}}">
    <span class="text-input__control">
        {{#if iconId}}
            <span class="text-input__icon" aria-hidden="true">
                <svg width="12" height="12">
                    <use xlink:href="#{{ iconId }}"></use>
                </svg>
            </span>
        {{/if}}
        {{#if isTextarea}}
            <textarea class="text-input__field text-input__field--textarea{{#if inputClass}} {{ inputClass }}{{/if}}"
                name="{{#if name}}{{ name }}{{else}}text-input{{/if}}" placeholder=" "
                {{#if required}}required{{/if}}>{{#if value}}{{ value }}{{/if}}</textarea>
        {{else}}
            <input class="text-input__field{{#if inputClass}} {{ inputClass }}{{/if}}"
                type="{{#if type}}{{ type }}{{else}}text{{/if}}"
                name="{{#if name}}{{ name }}{{else}}text-input{{/if}}" placeholder=" "
                {{#if autocomplete}}autocomplete="{{ autocomplete }}" {{/if}} {{#if required}}required{{/if}}
                {{#if value}}value="{{ value }}" {{/if}}>
        {{/if}}
        <span class="text-input__label">
            {{ label }}
        </span>
    </span>
    {{#if errorText}}
        <span class="validation-error">
            {{ errorText }}
        </span>
    {{/if}}
</label>
