<section class="toothguy{{#if class}} {{ class }}{{/if}}" aria-hidden="true">
    <div class="toothguy__character">
        <video class="toothguy__image js-toothguy-video" muted playsinline preload="auto" poster="/images/toothguy/toothguy-poster.webp" width="182" height="182" data-toothguy-video-delay="3000">
            <source src="/videos/toothguy/toothguy.mov" type='video/quicktime; codecs="hvc1"'>
            <source src="/videos/toothguy/toothguy.webm" type='video/webm; codecs="vp9"'>
            <img src="/images/toothguy/toothguy-poster.webp" alt="" loading="lazy" width="182" height="182">
        </video>
    </div>

    {{#unless hideBubble}}
        <div class="speech-bubble-shadow toothguy__bubble-wrap js-toothguy-bubble" data-toothguy-bubble-delay="1200">
            <div class="speech-bubble toothguy__bubble{{#if bubbleClass}} {{ bubbleClass }}{{/if}}">
                <p class="speech-bubble__text toothguy__text{{#if bubbleTextClass}} {{ bubbleTextClass }}{{/if}}">
                    {{#if bubbleText}}
                        {{{ bubbleText }}}
                    {{else}}
                        Ты точно чистишь
                        <br>
                        зубки каждый день?
                    {{/if}}
                </p>
            </div>
        </div>
    {{/unless}}
</section>
