<section class="quiz-start" aria-labelledby="quiz-start-title">
    <div class="quiz-start__grid">
        <div class="quiz-start__toothguy-wrap">
            {{> components/misc/toothguy hideBubble=true }}
        </div>

        <div class="quiz-start__main">
            <div class="quiz-start__frame">
                <div class="quiz-start__card">
                    <img class="quiz-start__icon" src="/images/quiz-start/toothbrushes.webp" alt="" loading="lazy"
                        width="130" height="130" aria-hidden="true">
                    <div class="quiz-start__text-content">
                        <h2 class="quiz-start__title" id="quiz-start-title">{{ quizStartTitle }}</h2>
                        <p class="quiz-start__description">{{{ quizStartDescription }}}</p>
                    </div>
                    <div class="quiz-start__actions">
                        <a href="{{ quizLeaderboardHref }}" class="outline-btn quiz-start__leaderboard">
                            <svg width="13" height="13" aria-hidden="true">
                                <use xlink:href="#leaderboard"></use>
                            </svg>
                            <span>{{ quizLeaderboardText }}</span>
                        </a>

                        <a href="{{ quizStartHref }}" class="btn btn--blue quiz-start__submit">
                            <span class="btn__text">{{ quizStartButtonText }}</span>
                            <span class="btn__icon">
                                <svg width="14" height="14" aria-hidden="true">
                                    <use xlink:href="#arrow-right"></use>
                                </svg>
                            </span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="quiz-start__aside" aria-hidden="true"></div>
    </div>
</section>
