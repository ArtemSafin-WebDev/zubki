<!DOCTYPE html>
<html lang="ru">

<head>
  {{> layout/meta }}
</head>

<body>
  <main class="page-main">
    <div class="pages-list-page">
      <section class="pages-list" aria-labelledby="pages-list-title">
        <div class="pages-list__header">
          <h1 class="pages-list__title" id="pages-list-title">Все страницы</h1>
          <p class="pages-list__lead">Быстрая навигация по собранным HTML-страницам проекта.</p>
        </div>

        <ul class="pages-list__items">
          {{#each pagesList}}
          <li class="pages-list__item">
            <a class="pages-list__link" href="{{url}}">
              <span class="pages-list__link-title">{{title}}</span>
              <span class="pages-list__link-url">{{url}}</span>
            </a>
          </li>
          {{/each}}
        </ul>
      </section>
    </div>
  </main>

  <script type="module" src="/src/js/main.ts"></script>
</body>

</html>
