<!DOCTYPE html>
<html lang="ru">

<head>
  {{> layout/meta }}
</head>

<body>
  <main class="page-main">
    <div class="quiz-page instruction-page">
      {{> layout/header }}
      {{> components/misc/quiz-secondary }}
      <section class="instruction-page__content" aria-label="Инструкция по дизайну">
        <div class="instruction-page__aside">
          {{> components/misc/toothguy hideBubble=true }}
        </div>
        <article class="instruction-page__card">
          <div class="instruction-page__scroll">
            <div class="instruction-page__scroll-content">
              {{> components/misc/instruction-content }}
            </div>
          </div>
        </article>
      </section>
    </div>
  </main>

  {{> components/misc/cookie-banner }}

  <script type="module" src="/src/js/main.ts"></script>
</body>

</html>
